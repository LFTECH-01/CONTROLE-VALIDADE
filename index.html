<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Validade - Banco na Nuvem</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="icon" type="image/png" sizes="192x192" href="logo192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="logo512x512.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Web Validade">
    <link rel="apple-touch-icon" href="logo192x192.png">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --dark: #2c3e50;
            --excel: #1d6f42;
            --cloud: #6366f1;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; color: #333; overflow-x: hidden; }
        
        /* --- ESTILO DO MENU LATERAL --- */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            background-color: var(--dark);
            overflow-x: hidden;
            transition: 0.4s;
            padding-top: 60px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
        }
        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 18px;
            color: #ecf0f1;
            display: block;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar a:hover { color: var(--primary); background: rgba(255,255,255,0.05); }
        .sidebar .closebtn {
            position: absolute;
            top: 10px;
            right: 25px;
            font-size: 36px;
            border-bottom: none;
        }

        /* --- CABEÇALHO COM BOTÃO HAMBÚRGUER --- */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 80px;
            margin-bottom: 10px;
        }
        .open-menu-btn {
            font-size: 30px;
            cursor: pointer;
            color: var(--dark);
            background: none;
            border: none;
            position: absolute; 
            left: 0;
            width: 50px;
            height: 50px;
            z-index: 100;
        }

        .container { 
            max-width: 500px; 
            margin: 5px auto; 
            background: white; 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }
        
        .auth-box { padding: 10px; text-align: center; }
        .hidden { display: none !important; }
        
        h2 { margin: 0; pointer-events: none; }
        h2 img { height: 75px; width: auto; max-width: 100%; object-fit: contain; }

        .db-section { background: #fdfdfd; border: 2px solid #e2e8f0; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .cloud-badge { background: var(--cloud); color: white; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        input, button { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        
        /* Ajuste do Campo de Data para mostrar o texto */
        input[type="date"]::before {
            content: attr(placeholder);
            width: 100%;
            color: #999;
        }
        input[type="date"]:focus::before,
        input[type="date"]:valid::before { display: none; }

        .btn-primary { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-success { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-excel { background: var(--excel); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-danger { background: #fee2e2; color: var(--danger); border: 1px solid var(--danger); font-weight: bold; cursor: pointer; }
        
        .item { background: #fff; border-left: 6px solid var(--success); padding: 12px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user-info { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 8px 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; font-weight: bold; }
        
        #reader { width: 100% !important; max-height: 250px; margin: 0 auto 15px; border-radius: 12px; overflow: hidden; display: none; border: 3px solid var(--primary); }
    </style>
</head>
<body>

<div id="mySidebar" class="sidebar">
  <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
  <a href="#" onclick="closeNav()">🏠 Início</a>
  <a href="#" onclick="closeNav()">📦 Inventário</a>
  <a href="#" onclick="closeNav()">⚙️ Configurações</a>
  <a href="#" id="btn-logout-sidebar">🚪 Sair</a>
</div>

<div class="container">
    <div class="header-container">
        <button class="open-menu-btn" onclick="openNav()">&#9776;</button>
        <h2><img src="logo512x512.png" alt="Logo Web Validade"></h2>
    </div>

    <div id="auth-section" class="auth-box">
        <div id="register-fields" class="hidden"><input type="text" id="nome_usuario" placeholder="Nome de Usuário"></div>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button id="btn-login" class="btn-primary">ENTRAR</button>
        <button id="btn-toggle-reg" style="background:none; border:none; color:var(--primary); cursor:pointer; font-size:14px;">Não tenho conta? Cadastrar</button>
        <button id="btn-cadastrar" class="btn-success hidden">FINALIZAR CADASTRO</button>
    </div>

    <div id="app-section" class="hidden">
        <div class="user-info">
            <span>👋 Olá, <span id="display-user-name"></span></span>
            <button id="btn-logout" style="width:auto; padding: 4px 8px; font-size: 11px;">Sair</button>
        </div>

        <div class="db-section">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span style="font-weight: bold; font-size: 13px;">☁️ Banco de Dados</span>
                <span id="statusCloud" class="cloud-badge">Sincronizando...</span>
            </div>
            <details style="font-size: 11px; color: #666;">
                <summary style="cursor:pointer">Gerenciar Banco (Importar CSV)</summary>
                <div style="margin-top: 10px;">
                    <input type="file" id="csvFile" accept=".csv" style="font-size: 10px;">
                </div>
            </details>
        </div>
        
        <button class="btn-primary" id="btnScan">📷 ESCANEAR CÓDIGO</button>
        <button id="btnStopCam" style="display:none; background:red; color:white;" class="btn-primary">❌ CANCELAR LEITURA</button>
        <div id="reader"></div>

        <form id="formEstoque">
            <input type="text" id="codigo" placeholder="Código de Barras" required>
            <input type="text" id="descricao" placeholder="Nome do Produto" required>
            <div style="display: flex; gap: 10px;">
                <input type="date" id="validade" placeholder="Data de Validade" required style="flex:1.5">
                <input type="number" id="quantidade" placeholder="Qtd" required style="flex:1">
            </div>
            <button type="submit" class="btn-success">SALVAR COLETA</button>
        </form>

        <button id="btnExportar" class="btn-excel">📊 EXPORTAR PARA EXCEL (.XLSX)</button>
        <hr>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="font-size: 16px; margin: 0;">📦 Itens (<span id="countItens">0</span>)</h3>
            <button id="btnLimparTudo" class="btn-danger" style="width: auto; padding: 5px 15px; font-size: 11px;">🗑️ LIMPAR TUDO</button>
        </div>
        <div id="listaProdutos">Carregando...</div>
    </div>
</div>

<script>
    /* FUNÇÕES DO MENU */
    function openNav() { document.getElementById("mySidebar").style.width = "250px"; }
    function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
</script>

<script type="module">
    /* MANTENDO TODA A LOGICA FIREBASE DO SEU BACKUP */
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBH4hDVSqv7enMugPWUaM9CksO4F1yKvuQ",
        authDomain: "controle-de-validade-3e66a.firebaseapp.com",
        projectId: "controle-de-validade-3e66a",
        storageBucket: "controle-de-validade-3e66a.firebasestorage.app",
        messagingSenderId: "163605465156",
        appId: "1:163605465156:web:8f7728cbf73e6bf6265411"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let html5QrCode;
    let listaAtualParaExportar = [];

    const formatarDataBR = (dataStr) => {
        if(!dataStr) return "";
        const [ano, mes, dia] = dataStr.split("-");
        return `${dia}/${mes}/${ano}`;
    };

    async function atualizarStatusContagemCloud() {
        const snapshot = await getDocs(collection(db, "produtos_base"));
        document.getElementById('statusCloud').innerText = `${snapshot.size} PRODUTOS NA NUVEM`;
    }

    // Auth logic
    document.getElementById('btn-login').onclick = () => {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        signInWithEmailAndPassword(auth, email, senha).catch(err => Swal.fire('Erro', 'Acesso negado', 'error'));
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);
    document.getElementById('btn-logout-sidebar').onclick = () => { signOut(auth); closeNav(); };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('display-user-name').innerText = user.displayName || user.email;
            carregarEstoque(user.uid);
            atualizarStatusContagemCloud();
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
        }
    });

    // Scanner
    document.getElementById('btnScan').onclick = () => {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('btnScan').style.display = 'none';
        document.getElementById('btnStopCam').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: { width: 250, height: 120 } }, (text) => {
            document.getElementById('codigo').value = text;
            pararLeitor();
        }).catch(err => console.error(err));
    };

    function pararLeitor() {
        if (html5QrCode) {
            html5QrCode.stop().finally(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('btnScan').style.display = 'block';
                document.getElementById('btnStopCam').style.display = 'none';
            });
        }
    }
    document.getElementById('btnStopCam').onclick = pararLeitor;

    // Estoque
    document.getElementById('formEstoque').onsubmit = async (e) => {
        e.preventDefault();
        await addDoc(collection(db, "estoque"), {
            uid: auth.currentUser.uid,
            codigo: document.getElementById('codigo').value,
            descricao: document.getElementById('descricao').value,
            validade: document.getElementById('validade').value,
            quantidade: document.getElementById('quantidade').value,
            criadoEm: Date.now()
        });
        e.target.reset();
    };

    function carregarEstoque(uid) {
        onSnapshot(query(collection(db, "estoque"), where("uid", "==", uid)), (snap) => {
            const lista = document.getElementById('listaProdutos');
            document.getElementById('countItens').innerText = snap.size;
            lista.innerHTML = '';
            listaAtualParaExportar = [];
            snap.forEach(d => {
                const p = d.data();
                listaAtualParaExportar.push(p);
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<div><strong>${p.descricao}</strong><br><small>${p.codigo} | Qtd: ${p.quantidade} | Val: ${formatarDataBR(p.validade)}</small></div>
                                 <button onclick="window.excluirItem('${d.id}')" style="width:auto; background:none; border:none; color:red; cursor:pointer">✕</button>`;
                lista.appendChild(div);
            });
        });
    }

    window.excluirItem = (id) => {
        deleteDoc(doc(db, "estoque", id));
    };

    document.getElementById('btnExportar').onclick = () => {
        const ws = XLSX.utils.json_to_sheet(listaAtualParaExportar.map(item => ({
            "Código": item.codigo, "Descrição": item.descricao, "Validade": formatarDataBR(item.validade), "Quantidade": item.quantidade
        })));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Coleta");
        XLSX.writeFile(wb, "Coleta_Validade.xlsx");
    };

    document.getElementById('btnLimparTudo').onclick = async () => {
        const snap = await getDocs(query(collection(db, "estoque"), where("uid", "==", auth.currentUser.uid)));
        const batch = writeBatch(db);
        snap.forEach(d => batch.delete(doc(db, "estoque", d.id)));
        await batch.commit();
    };
</script>
</body>
</html>
