<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Sincronizado</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .auth-box { padding: 20px; border: 1px solid #ddd; border-radius: 10px; background: #fff; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; margin-top: 10px; }
        .btn-outline { background: transparent; border: 1px solid #007bff; color: #007bff; margin-top: 5px; }
        .hidden { display: none; }
        .item { background: #f8f9fa; padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 5px solid #28a745; display: flex; justify-content: space-between; align-items: center; }
        .btn-del { width: auto; background: #ff4d4d; color: white; padding: 5px 10px; }
        #reader { width: 100%; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center">🛒 CONTROLE NA NUVEM</h2>

    <div id="auth-section" class="auth-box">
        <input type="email" id="email" placeholder="Seu e-mail">
        <input type="password" id="senha" placeholder="Sua senha">
        <button onclick="login()" class="btn-primary">ENTRAR</button>
        <button onclick="cadastrar()" class="btn-outline">CRIAR CONTA GRATUITA</button>
    </div>

    <div id="app-section" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <small id="user-mail" style="color: #666;"></small>
            <button onclick="logout()" style="width:auto; padding: 5px 10px; font-size: 12px;">Sair</button>
        </div>

        <button onclick="iniciarLeitor()" class="btn-primary" style="margin-top: 15px;">📷 ESCANEAR CÓDIGO</button>
        <div id="reader"></div>

        <form id="formEstoque">
            <input type="text" id="codigo" placeholder="Código de Barras" required>
            <input type="text" id="descricao" placeholder="Nome do Produto" required>
            <div style="display: flex; gap: 10px;">
                <input type="date" id="validade" required>
                <input type="number" id="quantidade" placeholder="Qtd" required>
            </div>
            <button type="submit" class="btn-success">SALVAR NO ESTOQUE</button>
        </form>

        <hr>
        <h3>📦 Meus Itens</h3>
        <div id="listaProdutos">Carregando itens...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ---------------------------------------------------------
    // PREENCHA COM OS DADOS DA ABA "GERAL" DO SEU FIREBASE:
    const firebaseConfig = {const firebaseConfig = {
  apiKey: "AIzaSy...", // É uma chave longa com letras e números
  authDomain: "seu-projeto.firebaseapp.com",
  projectId: "seu-projeto",
  storageBucket: "seu-projeto.appspot.com",
  messagingSenderId: "163605465156", // Este é o início do seu ID
  appId: "1:163605465156:android:74cbc7a951bc1d80265411" // O ID que você me mandou
};

        apiKey: "COLE_AQUI",
        authDomain: "COLE_AQUI",
        projectId: "COLE_AQUI",
        storageBucket: "COLE_AQUI",
        messagingSenderId: "COLE_AQUI",
        appId: "COLE_AQUI"
    };
    // ---------------------------------------------------------

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Funções Globais
    window.login = () => {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        signInWithEmailAndPassword(auth, email, senha).catch(err => alert("Erro ao entrar: " + err.message));
    };

    window.cadastrar = () => {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        createUserWithEmailAndPassword(auth, email, senha).then(() => alert("Conta criada!")).catch(err => alert("Erro ao cadastrar: " + err.message));
    };

    window.logout = () => signOut(auth);

    // Controle de Sessão
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-mail').innerText = user.email;
            carregarEstoque(user.uid);
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
        }
    });

    // Salvar Produto
    document.getElementById('formEstoque').onsubmit = async (e) => {
        e.preventDefault();
        try {
            await addDoc(collection(db, "estoque"), {
                uid: auth.currentUser.uid,
                codigo: document.getElementById('codigo').value,
                descricao: document.getElementById('descricao').value,
                validade: document.getElementById('validade').value,
                quantidade: document.getElementById('quantidade').value,
                criadoEm: Date.now()
            });
            document.getElementById('formEstoque').reset();
        } catch (err) { alert("Erro ao salvar: " + err.message); }
    };

    // Carregar em Tempo Real
    function carregarEstoque(uid) {
        const q = query(collection(db, "estoque"), where("uid", "==", uid));
        onSnapshot(q, (snapshot) => {
            const lista = document.getElementById('listaProdutos');
            lista.innerHTML = '';
            snapshot.forEach((docSnap) => {
                const p = docSnap.data();
                const id = docSnap.id;
                lista.innerHTML += `
                    <div class="item">
                        <div>
                            <strong>${p.descricao}</strong><br>
                            <small>Validade: ${p.validade.split('-').reverse().join('/')} | Qtd: ${p.quantidade}</small>
                        </div>
                        <button class="btn-del" onclick="remover('${id}')">X</button>
                    </div>`;
            });
        });
    }

    window.remover = async (id) => {
        if(confirm("Deseja excluir este item?")) await deleteDoc(doc(db, "estoque", id));
    };

    // Scanner
    let scanner;
    window.iniciarLeitor = () => {
        document.getElementById('reader').style.display = 'block';
        scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            document.getElementById('codigo').value = text;
            scanner.stop();
            document.getElementById('reader').style.display = 'none';
        }).catch(err => alert("Câmera não encontrada."));
    };
</script>
</body>
</html>
