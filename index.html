<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validade Pro Cloud</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --dark: #2c3e50;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        .auth-box { padding: 10px; text-align: center; }
        .hidden { display: none !important; }
        
        h2 { text-align: center; color: var(--dark); margin-bottom: 20px; font-weight: 800; font-size: 1.4rem; }
        
        .db-section { background: #f8f9fa; border: 2px dashed #cbd5e0; padding: 12px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        
        #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 15px; display: none; border: 3px solid var(--primary); }
        
        input, button { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; transition: 0.2s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }

        .btn-primary { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-success { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-stop { background: var(--danger); color: white; border: none; display: none; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        
        .item { background: #fff; border-left: 6px solid var(--success); padding: 12px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .vencido { border-left-color: var(--danger) !important; background: #fff5f5; }
        .alerta { border-left-color: var(--warning) !important; background: #fffdf2; }
        
        .badge { font-size: 11px; padding: 4px 8px; border-radius: 8px; text-transform: uppercase; font-weight: 700; background: #eee; }
        .vencido .badge { background: var(--danger); color: white; }
        .alerta .badge { background: var(--warning); color: #856404; }

        .btn-del { width: auto; background: #fee2e2; color: var(--danger); padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; }
        
        .user-info { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 8px 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛒 CONTROLE PRO CLOUD</h2>

    <div id="auth-section" class="auth-box">
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button id="btn-login" class="btn-primary">ENTRAR</button>
        <button id="btn-cadastrar" class="btn-outline">CRIAR CONTA</button>
    </div>

    <div id="app-section" class="hidden">
        <div class="user-info">
            <span id="user-mail"></span>
            <button id="btn-logout" style="width:auto; padding: 4px 8px; font-size: 11px;">Sair</button>
        </div>

        <div class="db-section">
            <label style="font-weight: bold; font-size: 13px;">📂 Banco Local (CSV)</label>
            <input type="file" id="csvFile" accept=".csv" onchange="importarBancoDados(this)" style="font-size: 11px;">
            <div id="statusDB" style="font-size: 11px; color: #666; margin-top: 4px;">Banco off-line.</div>
        </div>
        
        <button class="btn-primary" id="btnScan" onclick="iniciarLeitor()">📷 ESCANEAR CÓDIGO</button>
        <button class="btn-stop" id="btnStop" onclick="pararLeitor()">❌ CANCELAR</button>
        <div id="reader"></div>

        <form id="formEstoque">
            <input type="text" id="codigo" placeholder="Código de Barras" required>
            <input type="text" id="descricao" placeholder="Nome do Produto" required>
            <div style="display: flex; gap: 10px;">
                <input type="date" id="validade" required>
                <input type="number" id="quantidade" placeholder="Qtd" value="1" required>
            </div>
            <button type="submit" class="btn-success">SALVAR NA NUVEM</button>
        </form>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <h3 style="font-size: 16px;">📦 Itens Sincronizados (<span id="countItens">0</span>)</h3>
        <div id="listaProdutos">Carregando estoque...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- CONFIGURAÇÃO FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyBH4hDVSqv7enMugPWUaM9CksO4F1yKvuQ",
        authDomain: "controle-de-validade-3e66a.firebaseapp.com",
        projectId: "controle-de-validade-3e66a",
        storageBucket: "controle-de-validade-3e66a.firebasestorage.app",
        messagingSenderId: "163605465156",
        appId: "1:163605465156:web:8f7728cbf73e6bf6265411"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- VARIÁVEIS LOCAIS (CSV & SOM) ---
    let bancoProdutos = JSON.parse(localStorage.getItem('banco_produtos')) || {};
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function tocarBipe() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 880; gain.gain.value = 0.1;
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // --- AUTENTICAÇÃO ---
    document.getElementById('btn-login').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value)
            .catch(err => alert("Erro: " + err.message));
    };

    document.getElementById('btn-cadastrar').onclick = () => {
        createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value)
            .then(() => alert("Conta criada!"))
            .catch(err => alert("Erro: " + err.message));
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-mail').innerText = user.email;
            carregarEstoqueFirebase(user.uid);
            atualizarStatusDB();
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
        }
    });

    // --- BANCO LOCAL CSV ---
    window.importarBancoDados = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split(/\r?\n/);
            lines.forEach(line => {
                const cols = line.split(/[;,]/);
                if (cols.length >= 2) {
                    const ean = cols[0].trim().replace(/"/g, '');
                    const nome = cols[1].trim().replace(/"/g, '');
                    if(ean && ean.toLowerCase() !== "ean") bancoProdutos[ean] = nome;
                }
            });
            localStorage.setItem('banco_produtos', JSON.stringify(bancoProdutos));
            atualizarStatusDB();
            alert("Banco Local Carregado!");
        };
        reader.readAsText(input.files[0], 'UTF-8');
    };

    function atualizarStatusDB() {
        const total = Object.keys(bancoProdutos).length;
        document.getElementById('statusDB').innerText = total > 0 ? `✅ ${total} produtos no banco local.` : "❌ Sem banco local.";
    }

    // --- SCANNER ---
    let html5QrCode;
    window.iniciarLeitor = async () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('reader').style.display = 'block';
        document.getElementById('btnScan').style.display = 'none';
        document.getElementById('btnStop').style.display = 'block';
        
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
            document.getElementById('codigo').value = text;
            buscarEANLocal(text);
            pararLeitor();
            tocarBipe();
            if (navigator.vibrate) navigator.vibrate(100);
        }).catch(err => alert("Câmera erro: " + err));
    };

    window.pararLeitor = () => {
        if(html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('btnScan').style.display = 'block';
                document.getElementById('btnStop').style.display = 'none';
            });
        }
    };

    function buscarEANLocal(ean) {
        if (bancoProdutos[ean]) {
            document.getElementById('descricao').value = bancoProdutos[ean];
            setTimeout(() => document.getElementById('validade').focus(), 300);
        }
    }

    document.getElementById('codigo').oninput = (e) => buscarEANLocal(e.target.value);

    // --- FIREBASE OPERAÇÕES ---
    document.getElementById('formEstoque').onsubmit = async (e) => {
        e.preventDefault();
        try {
            await addDoc(collection(db, "estoque"), {
                uid: auth.currentUser.uid,
                codigo: document.getElementById('codigo').value,
                descricao: document.getElementById('descricao').value,
                validade: document.getElementById('validade').value,
                quantidade: document.getElementById('quantidade').value,
                criadoEm: Date.now()
            });
            e.target.reset();
            document.getElementById('quantidade').value = "1";
            document.getElementById('codigo').focus();
        } catch (err) { alert("Erro ao salvar: " + err.message); }
    };

    function carregarEstoqueFirebase(uid) {
        const q = query(collection(db, "estoque"), where("uid", "==", uid));
        onSnapshot(q, (snapshot) => {
            const lista = document.getElementById('listaProdutos');
            document.getElementById('countItens').innerText = snapshot.size;
            lista.innerHTML = '';
            
            let itens = [];
            snapshot.forEach(d => itens.push({id: d.id, ...d.data()}));
            itens.sort((a,b) => new Date(a.validade) - new Date(b.validade));

            itens.forEach((p) => {
                const hoje = new Date(); hoje.setHours(0,0,0,0);
                const dVenc = new Date(p.validade + "T00:00:00");
                const dias = Math.ceil((dVenc - hoje) / 86400000);
                
                const status = dias < 0 ? 'vencido' : (dias <= 15 ? 'alerta' : '');
                const label = dias < 0 ? 'VENCIDO' : (dias === 0 ? 'HOJE' : `${dias} dias`);

                const div = document.createElement('div');
                div.className = `item ${status}`;
                div.innerHTML = `
                    <div>
                        <strong>${p.descricao}</strong><br>
                        <small>Venc: ${p.validade.split('-').reverse().join('/')} | Qtd: ${p.quantidade}</small>
                    </div>
                    <div style="text-align:right">
                        <span class="badge">${label}</span><br>
                        <button class="btn-del" style="margin-top:5px">✕</button>
                    </div>`;
                
                div.querySelector('.btn-del').onclick = () => {
                    if(confirm("Excluir item da nuvem?")) deleteDoc(doc(db, "estoque", p.id));
                };
                lista.appendChild(div);
            });
        });
    }
</script>
</body>
</html>
