<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Validade - Banco na Nuvem</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="icon" type="image/png" sizes="192x192" href="logo192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="logo512x512.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Web Validade">
    <link rel="apple-touch-icon" href="logo192x192.png">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --dark: #2c3e50;
            --excel: #1d6f42;
            --cloud: #6366f1;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; color: #333; }
        
        /* 1. Container elevado e com padding superior zerado */
        .container { 
            max-width: 500px; 
            margin: 5px auto auto; /* Subiu o bloco branco quase no limite do navegador */
            background: white; 
            padding: 0 20px 20px 20px; /* Padding TOP zerado para a logo encostar no topo */
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }
        
        .auth-box { padding: 10px; text-align: center; }
        .hidden { display: none !important; }
        
        /* 2. Cabeçalho sem nenhuma margem superior */
        h2 { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: var(--dark); 
            margin-top: 0; 
            margin-bottom: 5px; /* Reduzido para aproximar do texto abaixo */
            padding-top: 0;
        }
        
        /* 3. Logo ajustada para a posição marcada */
        h2 img { 
            height: 120px; /* Reduzi levemente para caber melhor no topo elevado */
            width: auto; 
            max-width: 100%; 
            object-fit: contain;
        }

        .db-section { background: #fdfdfd; border: 2px solid #e2e8f0; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .cloud-badge { background: var(--cloud); color: white; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        input, button { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-success { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-excel { background: var(--excel); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-danger { background: #fee2e2; color: var(--danger); border: 1px solid var(--danger); font-weight: bold; cursor: pointer; }
        .btn-stop-cam { background: var(--danger); color: white; border: none; font-weight: bold; display: none; margin-bottom: 10px; }
        .item { background: #fff; border-left: 6px solid var(--success); padding: 12px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user-info { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 8px 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; font-weight: bold; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 15px; display: none; border: 3px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h2>
        <img src="logo512x512.png" alt="Logo Web Validade">
    </h2>

    <div id="auth-section" class="auth-box">
        <div id="register-fields" class="hidden"><input type="text" id="nome_usuario" placeholder="Nome de Usuário"></div>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button id="btn-login" class="btn-primary">ENTRAR</button>
        <button id="btn-toggle-reg" style="background:none; border:none; color:var(--primary); cursor:pointer; font-size:14px;">Não tenho conta? Cadastrar</button>
        <button id="btn-cadastrar" class="btn-success hidden">FINALIZAR CADASTRO</button>
    </div>

    <div id="app-section" class="hidden">
        <div class="user-info">
            <span>👋 Olá, <span id="display-user-name"></span></span>
            <button id="btn-logout" style="width:auto; padding: 4px 8px; font-size: 11px;">Sair</button>
        </div>

        <div class="db-section">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span style="font-weight: bold; font-size: 13px;">☁️ Banco de Dados na Nuvem</span>
                <span id="statusCloud" class="cloud-badge">Sincronizando...</span>
            </div>
            <details style="font-size: 11px; color: #666;">
                <summary style="cursor:pointer">Gerenciar Banco (Importar CSV)</summary>
                <div style="margin-top: 10px; padding: 10px; border: 1px dashed #ccc; border-radius: 8px;">
                    <p>Suba um CSV para atualizar o banco global:</p>
                    <input type="file" id="csvFile" accept=".csv" onchange="uploadCSVParaFirebase(this)" style="font-size: 10px;">
                </div>
            </details>
        </div>
        
        <button class="btn-primary" id="btnScan" onclick="iniciarLeitor()">📷 ESCANEAR CÓDIGO</button>
        <button class="btn-stop-cam" id="btnStopCam" onclick="pararLeitor()">❌ CANCELAR LEITURA</button>
        <div id="reader"></div>

        <form id="formEstoque">
            <input type="text" id="codigo" placeholder="Código de Barras" required>
            <input type="text" id="descricao" placeholder="Nome do Produto" required>
            <div style="display: flex; gap: 10px;">
                <input type="date" id="validade" style="flex:1.5" required>
                <input type="number" id="quantidade" placeholder="Qtd" style="flex:1" required>
            </div>
            <button type="submit" class="btn-success">SALVAR COLETA</button>
        </form>

        <button onclick="exportarExcel()" class="btn-excel">📊 EXPORTAR PARA EXCEL (.XLSX)</button>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="font-size: 16px; margin: 0;">📦 Itens Coletados (<span id="countItens">0</span>)</h3>
            <button onclick="limparTudoFirebase()" class="btn-danger" style="width: auto; padding: 5px 15px; font-size: 11px;">🗑️ LIMPAR TUDO</button>
        </div>
        
        <div id="listaProdutos">Carregando...</div>
    </div>
</div>

<script type="module">
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW registrado!', reg))
            .catch(err => console.log('Erro no SW', err));
        });
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBH4hDVSqv7enMugPWUaM9CksO4F1yKvuQ",
        authDomain: "controle-de-validade-3e66a.firebaseapp.com",
        projectId: "controle-de-validade-3e66a",
        storageBucket: "controle-de-validade-3e66a.firebasestorage.app",
        messagingSenderId: "163605465156",
        appId: "1:163605465156:web:8f7728cbf73e6bf6265411"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const btnScan = document.getElementById('btnScan');
    const btnStopCam = document.getElementById('btnStopCam');
    const readerDiv = document.getElementById('reader');
    const inputCodigo = document.getElementById('codigo');

    let html5QrCode;

    window.iniciarLeitor = () => {
        readerDiv.style.display = 'block';
        btnScan.style.display = 'none';
        btnStopCam.style.display = 'block';
        
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            inputCodigo.value = text;
            buscarProdutoNoFirebase(text);
            pararLeitor();
        }).catch(err => console.error(err));
    };

    window.pararLeitor = () => {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                readerDiv.style.display = 'none';
                btnScan.style.display = 'block';
                btnStopCam.style.display = 'none';
            });
        }
    };

    async function buscarProdutoNoFirebase(ean) {
        const q = query(collection(db, "produtos_base"), where("__name__", "==", ean));
        const snap = await getDocs(q);
        if (!snap.empty) {
            document.getElementById('descricao').value = snap.docs[0].data().nome;
            document.getElementById('validade').focus();
        }
    }

    inputCodigo.oninput = (e) => { if(e.target.value.length >= 8) buscarProdutoNoFirebase(e.target.value); };

    window.exportarExcel = () => {
        if (listaAtualParaExportar.length === 0) return alert("Nada para exportar!");
        const dadosFormatados = listaAtualParaExportar.map(item => ({
            "Código": item.codigo,
            "Descrição": item.descricao,
            "Validade": item.validade,
            "Quantidade": item.quantidade
        }));
        const ws = XLSX.utils.json_to_sheet(dadosFormatados);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Coleta_Estoque");
        XLSX.writeFile(wb, `Coleta_${new Date().toLocaleDateString()}.xlsx`);
    };

    const btnToggleReg = document.getElementById('btn-toggle-reg');
    const registerFields = document.getElementById('register-fields');
    const btnLogin = document.getElementById('btn-login');
    const btnCadastrar = document.getElementById('btn-cadastrar');

    btnToggleReg.onclick = () => {
        registerFields.classList.toggle('hidden');
        btnCadastrar.classList.toggle('hidden');
        btnLogin.classList.toggle('hidden');
    };

    btnLogin.onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value).catch(err => alert(err.message));
    btnCadastrar.onclick = () => {
        const nome = document.getElementById('nome_usuario').value;
        createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value)
            .then(res => updateProfile(res.user, { displayName: nome }).then(() => location.reload()))
            .catch(err => alert(err.message));
    };
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('display-user-name').innerText = user.displayName || user.email;
            carregarEstoqueFirebase(user.uid);
            atualizarStatusContagemCloud();
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
        }
    });

    window.uploadCSVParaFirebase = async (input) => {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const lines = e.target.result.split(/\r?\n/);
            const batch = writeBatch(db);
            let contador = 0;
            for (let line of lines) {
                const cols = line.split(/[;,]/);
                if (cols.length >= 2) {
                    const ean = cols[0].trim().replace(/"/g, '');
                    const nome = cols[1].trim().replace(/"/g, '');
                    if (ean && ean.toLowerCase() !== "ean") {
                        batch.set(doc(db, "produtos_base", ean), { nome: nome });
                        contador++;
                    }
                }
            }
            await batch.commit();
            alert(`Sincronizado: ${contador} produtos.`);
            atualizarStatusContagemCloud();
        };
        reader.readAsText(file, 'UTF-8');
    };

    async function atualizarStatusContagemCloud() {
        const snapshot = await getDocs(collection(db, "produtos_base"));
        document.getElementById('statusCloud').innerText = `${snapshot.size} PRODUTOS NA NUVEM`;
    }

    document.getElementById('formEstoque').onsubmit = async (e) => {
        e.preventDefault();
        await addDoc(collection(db, "estoque"), {
            uid: auth.currentUser.uid,
            codigo: inputCodigo.value,
            descricao: document.getElementById('descricao').value,
            validade: document.getElementById('validade').value,
            quantidade: document.getElementById('quantidade').value,
            criadoEm: Date.now()
        });
        e.target.reset();
        inputCodigo.focus();
    };

    let listaAtualParaExportar = [];
    function carregarEstoqueFirebase(uid) {
        onSnapshot(query(collection(db, "estoque"), where("uid", "==", uid)), (snap) => {
            const lista = document.getElementById('listaProdutos');
            document.getElementById('countItens').innerText = snap.size;
            lista.innerHTML = '';
            listaAtualParaExportar = [];
            snap.forEach(d => {
                const p = d.data();
                p.ID = d.id;
                listaAtualParaExportar.push(p);
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<div><strong>${p.descricao}</strong><br><small>${p.codigo} | Qtd: ${p.quantidade}</small></div>
                                 <button onclick="excluirItem('${d.id}')" style="width:auto; background:none; border:none; color:red; cursor:pointer">✕</button>`;
                lista.appendChild(div);
            });
        });
    }

    window.excluirItem = (id) => deleteDoc(doc(db, "estoque", id));
    window.limparTudoFirebase = async () => {
        if (confirm("Apagar toda a coleta?")) {
            const snap = await getDocs(query(collection(db, "estoque"), where("uid", "==", auth.currentUser.uid)));
            snap.forEach(d => deleteDoc(doc(db, "estoque", d.id)));
        }
    };
</script>
</body>
</html>
