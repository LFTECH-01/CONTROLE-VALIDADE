<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Validade - Banco na Nuvem</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="icon" type="image/png" sizes="192x192" href="logo192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="logo512x512.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Web Validade">
    <link rel="apple-touch-icon" href="logo192x192.png">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --dark: #2c3e50;
            --excel: #1d6f42;
            --cloud: #6366f1;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; color: #333; }
        
        .container { 
            max-width: 500px; 
            margin: 5px auto auto; 
            background: white; 
            padding: 0 20px 20px 20px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }
        
        .auth-box { padding: 10px; text-align: center; }
        .hidden { display: none !important; }
        
        h2 { display: flex; justify-content: center; align-items: center; margin: 0; padding: 0; }
        h2 img { height: 110px; width: auto; max-width: 100%; object-fit: contain; }

        .db-section { background: #fdfdfd; border: 2px solid #e2e8f0; padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .cloud-badge { background: var(--cloud); color: white; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        
        /* Estilo dos Inputs e Botões Restaurados */
        input, button { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-success { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-excel { background: var(--excel); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-danger { background: #fee2e2; color: var(--danger); border: 1px solid var(--danger); font-weight: bold; cursor: pointer; }
        
        /* Botão de Parar Câmera */
        .btn-stop-cam { background: var(--danger); color: white; border: none; font-weight: bold; display: none; margin-bottom: 10px; }
        
        .item { background: #fff; border-left: 6px solid var(--success); padding: 12px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user-info { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 8px 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; font-weight: bold; }
        
        /* Scanner de QR Code Restaurado */
        #reader { 
            width: 100% !important; 
            border-radius: 12px; 
            overflow: hidden; 
            margin: 0 auto 15px auto; 
            display: none; 
            border: 3px solid var(--primary); 
        }

        /* Modal Customizado (Estreito conforme pedido) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center;
            z-index: 3000; opacity: 0; visibility: hidden; transition: 0.2s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box {
            background: white; border-radius: 20px; padding: 20px;
            width: 80%; max-width: 300px; text-align: center;
        }
        .modal-text { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
        .modal-btns { display: flex; gap: 10px; }
        .m-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="myModal" class="modal-overlay">
    <div class="modal-box">
        <p id="modalMsg" class="modal-text"></p>
        <div id="modalConfirmBtns" class="modal-btns hidden">
            <button class="m-btn" style="background:#eee" onclick="closeModal()">Cancelar</button>
            <button id="modalConfirmAction" class="m-btn" style="background:var(--danger); color:white">Apagar</button>
        </div>
        <div id="modalOkBtn" class="modal-btns hidden">
            <button class="m-btn" style="background:var(--success); color:white" onclick="closeModal()">OK</button>
        </div>
    </div>
</div>

<div class="container">
    <h2><img src="logo512x512.png" alt="Logo"></h2>

    <div id="auth-section" class="auth-box">
        <div id="register-fields" class="hidden"><input type="text" id="nome_usuario" placeholder="Nome de Usuário"></div>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button id="btn-login" class="btn-primary">ENTRAR</button>
        <button id="btn-toggle-reg" style="background:none; border:none; color:var(--primary); font-size:14px;">Não tenho conta? Cadastrar</button>
        <button id="btn-cadastrar" class="btn-success hidden">FINALIZAR CADASTRO</button>
    </div>

    <div id="app-section" class="hidden">
        <div class="user-info">
            <span>👋 Olá, <span id="display-user-name"></span></span>
            <button id="btn-logout" style="width:auto; padding: 4px 8px; font-size: 11px;">Sair</button>
        </div>

        <div class="db-section">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: bold; font-size: 13px;">☁️ Banco na Nuvem</span>
                <span id="statusCloud" class="cloud-badge">...</span>
            </div>
            <details style="font-size: 11px; margin-top:5px;">
                <summary style="cursor:pointer">Gerenciar Banco (Importar CSV)</summary>
                <input type="file" id="csvFile" accept=".csv" onchange="uploadCSVParaFirebase(this)" style="margin-top:5px; font-size:10px;">
            </details>
        </div>
        
        <button class="btn-primary" id="btnScan" onclick="iniciarLeitor()">📷 ESCANEAR CÓDIGO</button>
        <button class="btn-stop-cam" id="btnStopCam" onclick="pararLeitor()">❌ CANCELAR LEITURA</button>
        <div id="reader"></div>

        <form id="formEstoque">
            <input type="text" id="codigo" placeholder="Código de Barras" required>
            <input type="text" id="descricao" placeholder="Nome do Produto" required>
            <div style="display: flex; gap: 10px;">
                <input type="date" id="validade" style="flex:1.5" required>
                <input type="number" id="quantidade" placeholder="Qtd" style="flex:1" required>
            </div>
            <button type="submit" class="btn-success">SALVAR COLETA</button>
        </form>

        <button onclick="exportarExcel()" class="btn-excel">📊 EXPORTAR PARA EXCEL (.XLSX)</button>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="font-size: 16px; margin: 0;">📦 Itens Coletados (<span id="countItens">0</span>)</h3>
            <button onclick="askLimparTudo()" class="btn-danger" style="width: auto; padding: 5px 15px; font-size: 11px;">🗑️ LIMPAR TUDO</button>
        </div>
        <div id="listaProdutos">Carregando...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBH4hDVSqv7enMugPWUaM9CksO4F1yKvuQ",
        authDomain: "controle-de-validade-3e66a.firebaseapp.com",
        projectId: "controle-de-validade-3e66a",
        storageBucket: "controle-de-validade-3e66a.firebasestorage.app",
        messagingSenderId: "163605465156",
        appId: "1:163605465156:web:8f7728cbf73e6bf6265411"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let html5QrCode;
    let listaAtualParaExportar = [];

    // --- MODAL ---
    window.closeModal = () => document.getElementById('myModal').classList.remove('active');
    
    window.askLimparTudo = () => {
        document.getElementById('modalMsg').innerText = "Apagar toda a coleta?";
        document.getElementById('modalConfirmBtns').classList.remove('hidden');
        document.getElementById('modalOkBtn').classList.add('hidden');
        document.getElementById('myModal').classList.add('active');
        document.getElementById('modalConfirmAction').onclick = async () => {
            const snap = await getDocs(query(collection(db, "estoque"), where("uid", "==", auth.currentUser.uid)));
            const batch = writeBatch(db);
            snap.forEach(d => batch.delete(doc(db, "estoque", d.id)));
            await batch.commit();
            closeModal();
        };
    };

    const showMsg = (txt) => {
        document.getElementById('modalMsg').innerText = txt;
        document.getElementById('modalConfirmBtns').classList.add('hidden');
        document.getElementById('modalOkBtn').classList.remove('hidden');
        document.getElementById('myModal').classList.add('active');
    };

    // --- LOGICA RESTAURADA ---
    const formatarDataBR = (d) => { if(!d) return ""; const [a,m,dia] = d.split("-"); return `${dia}/${m}/${a}`; };

    window.iniciarLeitor = () => {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('btnScan').style.display = 'none';
        document.getElementById('btnStopCam').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: { width: 250, height: 150 } }, (text) => {
            document.getElementById('codigo').value = text;
            buscarProduto(text);
            pararLeitor();
        }).catch(err => console.error(err));
    };

    window.pararLeitor = () => {
        if(html5QrCode) html5QrCode.stop().then(() => {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('btnScan').style.display = 'block';
            document.getElementById('btnStopCam').style.display = 'none';
        });
    };

    async function buscarProduto(ean) {
        const q = query(collection(db, "produtos_base"), where("__name__", "==", ean));
        const snap = await getDocs(q);
        if(!snap.empty) {
            document.getElementById('descricao').value = snap.docs[0].data().nome;
            document.getElementById('validade').focus();
        }
    }

    document.getElementById('codigo').oninput = (e) => { if(e.target.value.length >= 8) buscarProduto(e.target.value); };

    window.exportarExcel = () => {
        if(listaAtualParaExportar.length === 0) return showMsg("Nada para exportar!");
        const ws = XLSX.utils.json_to_sheet(listaAtualParaExportar.map(i => ({ "Código": i.codigo, "Descrição": i.descricao, "Validade": formatarDataBR(i.validade), "Qtd": i.quantidade })));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Coleta");
        XLSX.writeFile(wb, `Coleta_${new Date().toLocaleDateString()}.xlsx`);
        showMsg("Planilha gerada com sucesso!");
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('display-user-name').innerText = user.displayName || user.email;
            carregarEstoque(user.uid);
            atualizarContagem();
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
        }
    });

    function carregarEstoque(uid) {
        onSnapshot(query(collection(db, "estoque"), where("uid", "==", uid)), (snap) => {
            const lista = document.getElementById('listaProdutos');
            document.getElementById('countItens').innerText = snap.size;
            lista.innerHTML = '';
            listaAtualParaExportar = [];
            snap.forEach(d => {
                const p = d.data();
                listaAtualParaExportar.push(p);
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<div><strong>${p.descricao}</strong><br><small>${p.codigo} | Qtd: ${p.quantidade} | Val: ${formatarDataBR(p.validade)}</small></div>
                                 <button onclick="excluirItem('${d.id}')" style="color:red; background:none; border:none; cursor:pointer">✕</button>`;
                lista.appendChild(div);
            });
        });
    }

    window.excluirItem = (id) => deleteDoc(doc(db, "estoque", id));

    document.getElementById('formEstoque').onsubmit = async (e) => {
        e.preventDefault();
        await addDoc(collection(db, "estoque"), {
            uid: auth.currentUser.uid,
            codigo: document.getElementById('codigo').value,
            descricao: document.getElementById('descricao').value,
            validade: document.getElementById('validade').value,
            quantidade: document.getElementById('quantidade').value
        });
        e.target.reset();
        document.getElementById('codigo').focus();
    };

    // Autenticação
    document.getElementById('btn-toggle-reg').onclick = () => {
        document.getElementById('register-fields').classList.toggle('hidden');
        document.getElementById('btn-cadastrar').classList.toggle('hidden');
        document.getElementById('btn-login').classList.toggle('hidden');
    };
    document.getElementById('btn-login').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value).catch(err => showMsg("Erro: " + err.message));
    document.getElementById('btn-cadastrar').onclick = () => {
        createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value)
        .then(res => updateProfile(res.user, { displayName: document.getElementById('nome_usuario').value }).then(() => location.reload()))
        .catch(err => showMsg("Erro: " + err.message));
    };
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    async function atualizarContagem() {
        const snapshot = await getDocs(collection(db, "produtos_base"));
        document.getElementById('statusCloud').innerText = `${snapshot.size} PRODUTOS`;
    }

    window.uploadCSVParaFirebase = async (input) => {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const lines = e.target.result.split(/\r?\n/);
            const batch = writeBatch(db);
            for (let line of lines) {
                const cols = line.split(/[;,]/);
                if (cols.length >= 2) {
                    const ean = cols[0].trim().replace(/"/g, '');
                    const nome = cols[1].trim().replace(/"/g, '');
                    if (ean && ean.toLowerCase() !== "ean") batch.set(doc(db, "produtos_base", ean), { nome: nome });
                }
            }
            await batch.commit();
            showMsg("Base de dados atualizada!");
            atualizarContagem();
        };
        reader.readAsText(file, 'UTF-8');
    };
</script>
</body>
</html>
