<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Validade - Banco na Nuvem</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="icon" type="image/png" sizes="192x192" href="logo192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="logo512x512.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Web Validade">
    <link rel="apple-touch-icon" href="logo192x192.png">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --dark: #2c3e50;
            --excel: #1d6f42;
            --cloud: #6366f1;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; color: #333; }
        
        .container { 
            max-width: 500px; 
            margin: 5px auto auto; 
            background: white; 
            padding: 0 20px 20px 20px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }
        
        .auth-box { padding: 10px; text-align: center; }
        .hidden { display: none !important; }
        
        h2 { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-top: 0; 
            margin-bottom: 5px; 
        }
        
        h2 img { 
            height: 90px; 
            width: auto; 
            max-width: 100%; 
            object-fit: contain;
        }

        .db-section { background: #fdfdfd; border: 2px solid #e2e8f0; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .cloud-badge { background: var(--cloud); color: white; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        input, button { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-success { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-excel { background: var(--excel); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-danger { background: #fee2e2; color: var(--danger); border: 1px solid var(--danger); font-weight: bold; cursor: pointer; }
        .btn-stop-cam { background: var(--danger); color: white; border: none; font-weight: bold; display: none; margin-bottom: 10px; }
        .item { background: #fff; border-left: 6px solid var(--success); padding: 12px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user-info { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 8px 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; font-weight: bold; }
        
        #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 15px; display: none; border: 3px solid var(--primary); }

        /* MODAL CUSTOMIZADO */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0; visibility: hidden;
            transition: 0.2s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 85%;
            max-width: 300px; /* Largura reduzida conforme solicitado */
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            transform: translateY(20px);
            transition: 0.3s;
        }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        .modal-icon { font-size: 40px; margin-bottom: 10px; display: block; }
        .modal-text { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 20px; line-height: 1.4; }
        .modal-buttons { display: flex; gap: 10px; }
        .btn-m { flex: 1; padding: 12px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; font-size: 14px; }
        .btn-m-cancel { background: #f1f5f9; color: #64748b; }
        .btn-m-ok { background: var(--danger); color: white; }
        .btn-m-success { background: var(--success); color: white; }
    </style>
</head>
<body>

<div id="customModal" class="modal-overlay">
    <div class="modal-box">
        <span id="modalIcon" class="modal-icon">⚠️</span>
        <p id="modalText" class="modal-text">Mensagem do sistema</p>
        <div class="modal-buttons" id="modalActionButtons">
            <button class="btn-m btn-m-cancel" onclick="closeModal()">Cancelar</button>
            <button class="btn-m btn-m-ok" id="btnModalConfirm">Confirmar</button>
        </div>
        <div class="modal-buttons hidden" id="modalOkButton">
            <button class="btn-m btn-m-success" onclick="closeModal()">Entendido</button>
        </div>
    </div>
</div>

<div class="container">
    <h2><img src="logo512x512.png" alt="Logo Web Validade"></h2>

    <div id="auth-section" class="auth-box">
        <div id="register-fields" class="hidden"><input type="text" id="nome_usuario" placeholder="Nome de Usuário"></div>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button id="btn-login" class="btn-primary">ENTRAR</button>
        <button id="btn-toggle-reg" style="background:none; border:none; color:var(--primary); cursor:pointer; font-size:14px;">Não tenho conta? Cadastrar</button>
        <button id="btn-cadastrar" class="btn-success hidden">FINALIZAR CADASTRO</button>
    </div>

    <div id="app-section" class="hidden">
        <div class="user-info">
            <span>👋 <span id="display-user-name"></span></span>
            <button id="btn-logout" style="width:auto; padding: 4px 8px; font-size: 11px;">Sair</button>
        </div>

        <div class="db-section">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span style="font-weight: bold; font-size: 13px;">☁️ Banco de Dados</span>
                <span id="statusCloud" class="cloud-badge">...</span>
            </div>
            <details style="font-size: 11px; color: #666;">
                <summary style="cursor:pointer">Importar CSV</summary>
                <input type="file" id="csvFile" accept=".csv" onchange="uploadCSVParaFirebase(this)">
            </details>
        </div>
        
        <button class="btn-primary" onclick="iniciarLeitor()">📷 ESCANEAR CÓDIGO</button>
        <button class="btn-stop-cam" id="btnStopCam" onclick="pararLeitor()">❌ CANCELAR LEITURA</button>
        <div id="reader"></div>

        <form id="formEstoque">
            <input type="text" id="codigo" placeholder="Código de Barras" required>
            <input type="text" id="descricao" placeholder="Nome do Produto" required>
            <div style="display: flex; gap: 10px;">
                <input type="date" id="validade" style="flex:1.5" required>
                <input type="number" id="quantidade" placeholder="Qtd" style="flex:1" required>
            </div>
            <button type="submit" class="btn-success">SALVAR COLETA</button>
        </form>

        <button onclick="gerarExcel()" class="btn-excel">📊 EXPORTAR PARA EXCEL (.XLSX)</button>
        <hr>
        
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="font-size: 16px;">📦 Coletas (<span id="countItens">0</span>)</h3>
            <button onclick="confirmarLimparTudo()" class="btn-danger" style="width: auto; padding: 5px 15px; font-size: 11px;">🗑️ LIMPAR TUDO</button>
        </div>
        <div id="listaProdutos">Carregando...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBH4hDVSqv7enMugPWUaM9CksO4F1yKvuQ",
        authDomain: "controle-de-validade-3e66a.firebaseapp.com",
        projectId: "controle-de-validade-3e66a",
        storageBucket: "controle-de-validade-3e66a.firebasestorage.app",
        messagingSenderId: "163605465156",
        appId: "1:163605465156:web:8f7728cbf73e6bf6265411"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let html5QrCode;
    let listaAtualParaExportar = [];

    // --- SISTEMA DE MODAL CUSTOMIZADO ---
    window.showCustomAlert = (titulo, icone = '✅') => {
        document.getElementById('modalIcon').innerText = icone;
        document.getElementById('modalText').innerText = titulo;
        document.getElementById('modalActionButtons').classList.add('hidden');
        document.getElementById('modalOkButton').classList.remove('hidden');
        document.getElementById('customModal').classList.add('active');
    };

    window.confirmarLimparTudo = () => {
        document.getElementById('modalIcon').innerText = '🗑️';
        document.getElementById('modalText').innerText = 'Deseja apagar toda a coleta atual? Esta ação não pode ser desfeita.';
        document.getElementById('modalActionButtons').classList.remove('hidden');
        document.getElementById('modalOkButton').classList.add('hidden');
        document.getElementById('customModal').classList.add('active');
        
        document.getElementById('btnModalConfirm').onclick = async () => {
            const snap = await getDocs(query(collection(db, "estoque"), where("uid", "==", auth.currentUser.uid)));
            const batch = writeBatch(db);
            snap.forEach(d => batch.delete(doc(db, "estoque", d.id)));
            await batch.commit();
            closeModal();
        };
    };

    window.closeModal = () => document.getElementById('customModal').classList.remove('active');

    // --- LEITOR E BUSCA ---
    window.iniciarLeitor = () => {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('btnStopCam').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            document.getElementById('codigo').value = text;
            buscarProdutoNoFirebase(text);
            pararLeitor();
        }).catch(err => console.error(err));
    };

    window.pararLeitor = () => {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('btnStopCam').style.display = 'none';
            });
        }
    };

    async function buscarProdutoNoFirebase(ean) {
        const q = query(collection(db, "produtos_base"), where("__name__", "==", ean));
        const snap = await getDocs(q);
        if (!snap.empty) {
            document.getElementById('descricao').value = snap.docs[0].data().nome;
            document.getElementById('validade').focus();
        }
    }

    // --- EXCEL ---
    window.gerarExcel = () => {
        if (listaAtualParaExportar.length === 0) return showCustomAlert("Lista vazia!", "❌");
        const ws = XLSX.utils.json_to_sheet(listaAtualParaExportar.map(i => ({ "Código": i.codigo, "Descrição": i.descricao, "Validade": i.validade, "Qtd": i.quantidade })));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Dados");
        XLSX.writeFile(wb, `Coleta_${new Date().toLocaleDateString()}.xlsx`);
        showCustomAlert("Planilha gerada com sucesso!", "📊");
    };

    // --- AUTH E FIRESTORE ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('display-user-name').innerText = user.displayName || user.email;
            carregarEstoque(user.uid);
            atualizarContagemCloud();
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
        }
    });

    function carregarEstoque(uid) {
        onSnapshot(query(collection(db, "estoque"), where("uid", "==", uid)), (snap) => {
            const lista = document.getElementById('listaProdutos');
            document.getElementById('countItens').innerText = snap.size;
            lista.innerHTML = '';
            listaAtualParaExportar = [];
            snap.forEach(d => {
                const p = d.data();
                listaAtualParaExportar.push(p);
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<div><strong>${p.descricao}</strong><br><small>${p.codigo} | Qtd: ${p.quantidade} | Val: ${p.validade}</small></div>
                                 <button onclick="excluirItem('${d.id}')" style="color:red; background:none; border:none; cursor:pointer">✕</button>`;
                lista.appendChild(div);
            });
        });
    }

    window.excluirItem = (id) => deleteDoc(doc(db, "estoque", id));

    document.getElementById('formEstoque').onsubmit = async (e) => {
        e.preventDefault();
        await addDoc(collection(db, "estoque"), {
            uid: auth.currentUser.uid,
            codigo: document.getElementById('codigo').value,
            descricao: document.getElementById('descricao').value,
            validade: document.getElementById('validade').value,
            quantidade: document.getElementById('quantidade').value,
            criadoEm: Date.now()
        });
        e.target.reset();
    };

    // Login/Cadastro Toggle
    document.getElementById('btn-toggle-reg').onclick = () => {
        document.getElementById('register-fields').classList.toggle('hidden');
        document.getElementById('btn-cadastrar').classList.toggle('hidden');
        document.getElementById('btn-login').classList.toggle('hidden');
    };

    document.getElementById('btn-login').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value);
    document.getElementById('btn-cadastrar').onclick = () => {
        createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value)
        .then(res => updateProfile(res.user, { displayName: document.getElementById('nome_usuario').value }).then(() => location.reload()));
    };
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    async function atualizarContagemCloud() {
        const snapshot = await getDocs(collection(db, "produtos_base"));
        document.getElementById('statusCloud').innerText = `${snapshot.size} PRODUTOS`;
    }
</script>
</body>
</html>
